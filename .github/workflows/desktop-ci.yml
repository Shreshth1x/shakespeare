name: Desktop CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      SHAKESPEARE_MOCK_MODEL: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Syntax check bundled scripts
        run: npm run check:syntax

      - name: Package desktop app
        run: npm run package

      - name: Smoke test package
        run: npm run qa:package

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: shakespeare-${{ matrix.os }}
          path: release/**
          if-no-files-found: error
